services:
  postgres:
    image: postgres:17

    container_name: noh-postgres

    restart: unless-stopped

    environment:
      POSTGRES_USER: karan
      POSTGRES_PASSWORD: password
      POSTGRES_DB: nexopshub

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: